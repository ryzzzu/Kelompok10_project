<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

  <div class="flex min-h-screen">

    <aside class="w-64 bg-slate-800 text-slate-300 flex flex-col transition-all duration-300">
      <div class="h-16 flex items-center justify-center border-b border-slate-700">
        <h1 class="text-2xl font-bold text-white tracking-wider">ADMIN<span class="text-blue-500">PRO</span></h1>
      </div>
      <nav class="flex-1 px-4 py-6 space-y-2">
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg">
          <span class="font-medium">Dashboard</span>
        </a>
        <a href="user.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-700 hover:text-white rounded-lg transition-colors">
          <span class="font-medium">Manajemen User</span>
        </a>
      
      </nav>
    </aside>

    <div class="flex flex-col flex-1 w-full overflow-hidden">
      
      <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
        <div>
          <h2 class="text-xl font-semibold text-slate-800">Ringkasan Sistem</h2>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-3 border-l pl-4 border-slate-200">
            <div class="flex flex-col text-right">
              <span class="text-sm font-semibold text-slate-800">Admin Not's</span>
              <span class="text-xs text-slate-500">Superadmin</span>
            </div>
            <div class="h-10 w-10 rounded-full bg-blue-100 border-2 border-blue-500 flex items-center justify-center text-blue-600 font-bold">
              AN
            </div>
          </div>
        </div>
      </header>

      <main class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 p-6">
        <div class="mx-auto w-full max-w-7xl">
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
              <h3 class="text-slate-500 text-sm font-medium mb-1">Total Pengguna</h3>
              <p class="text-3xl font-bold text-slate-800">1,240</p>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
              <h3 class="text-slate-500 text-sm font-medium mb-1">Pendapatan</h3>
              <p class="text-3xl font-bold text-slate-800">Rp 15.000.000</p>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
              <h3 class="text-slate-500 text-sm font-medium mb-1">Tiket Aktif</h3>
              <p class="text-3xl font-bold text-slate-800">24</p>
            </div>
          </div>

        </div>
      </main>

      <footer class="bg-white border-t border-slate-200 py-4 px-6 mt-auto">
        <div class="flex items-center justify-between text-sm text-slate-500">
          <p>&copy; 2026 AdminPro System. All rights reserved.</p>
        </div>
      </footer>

    </div>
  </div>

</body>
</html>
