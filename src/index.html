<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-slate-800 text-slate-300 flex flex-col">
    <div class="h-16 flex items-center justify-center border-b border-slate-700">
      <h1 class="text-2xl font-bold text-white">
        ADMIN <span class="text-blue-500">PANEL</span>
      </h1>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2">
      <a href="index.html" class="flex px-4 py-3 bg-blue-600 text-white rounded-lg">
        Dashboard
      </a>
      <a href="user.html" class="flex px-4 py-3 rounded-lg hover:bg-slate-700 hover:text-white">
        Manajemen User
      </a>
      <a href="pengaturan.html" class="flex px-4 py-3 rounded-lg hover:bg-slate-700 hover:text-white">
        Pengaturan
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <div class="flex flex-col flex-1">

    <header class="h-16 bg-white shadow flex items-center justify-between px-6">
      <h2 class="text-xl font-semibold">Ringkasan Sistem</h2>
      <span>Admin</span>
    </header>

    <main class="flex-1 p-6">
      <div class="grid md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-xl shadow">
          <p>Total Pengguna</p>
          <h1 class="text-3xl font-bold">1,240</h1>
        </div>
        <div class="bg-white p-6 rounded-xl shadow">
          <p>Pendapatan</p>
          <h1 class="text-3xl font-bold">Rp 15.000.000</h1>
        </div>
        <div class="bg-white p-6 rounded-xl shadow">
          <p>Tiket Aktif</p>
          <h1 class="text-3xl font-bold">24</h1>
        </div>
      </div>
    </main>

  </div>
</div>

</body>
</html>
