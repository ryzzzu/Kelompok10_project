<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen User</title>
  <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-slate-50 font-sans text-slate-800">

<div class="flex min-h-screen">

  <aside class="w-64 bg-slate-800 text-slate-300 flex flex-col">
    <div class="h-16 flex items-center justify-center border-b border-slate-700">
      <h1 class="text-2xl font-bold text-white tracking-wider">
        ADMIN <span class="text-blue-500">PANEL</span>
      </h1>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg">
        Dashboard
      </a>

      <a href="user.html" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg">
        Manajemen User
      </a>

      <a href="pengaturan.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg">
        Pengaturan
      </a>
    </nav>
  </aside>

  <div class="flex flex-col flex-1">

    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6">
      <h2 class="text-xl font-semibold">Manajemen User</h2>

      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-sm font-semibold">Admin Notes</p>
          <p class="text-xs text-slate-500">Superadmin</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-blue-100 border-2 border-blue-500 flex items-center justify-center font-bold">
          AN
        </div>
      </div>
    </header>

    <main class="p-6">

      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h3 class="text-lg font-semibold mb-4">Tambah User</h3>

        <div class="flex flex-wrap gap-3">
          <input id="nama" placeholder="Nama" class="border px-3 py-2 rounded w-full md:w-1/3">
          <input id="email" placeholder="Email" class="border px-3 py-2 rounded w-full md:w-1/3">
          <button onclick="tambahUser()" class="bg-blue-600 text-white px-5 py-2 rounded">
            + Tambah
          </button>
        </div>
      </div>

      <div class="mb-4">
        <input id="search" onkeyup="searchUser()" placeholder="Cari user..." class="border px-4 py-2 rounded w-full md:w-1/3">
      </div>

      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-slate-100">
            <tr>
              <th class="p-3 text-left">Nama</th>
              <th class="p-3 text-left">Email</th>
              <th class="p-3 text-left">Aksi</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>

        <div id="emptyState" class="text-center py-10 text-slate-400 hidden">
          Tidak ada user
        </div>
      </div>

    </main>

    <footer class="bg-white border-t py-4 px-6 text-sm text-slate-500">
      © 2026 Admin Panel
    </footer>

  </div>
</div>

<script>
let users = [
  {nama: "Admin", email: "admin@gmail.com"}
];

let filteredUsers = [...users];

function renderUser(){
  let table = document.getElementById('userTable');
  let empty = document.getElementById('emptyState');

  table.innerHTML = "";

  if(filteredUsers.length === 0){
    empty.classList.remove("hidden");
    return;
  } else {
    empty.classList.add("hidden");
  }

  filteredUsers.forEach((user, index)=>{
    table.innerHTML += `
      <tr class="border-t">
        <td class="p-3">${user.nama}</td>
        <td class="p-3">${user.email}</td>
        <td class="p-3">
          <button onclick="hapusUser(${index})" class="bg-red-500 text-white px-2 py-1 rounded text-xs">
            Hapus
          </button>
        </td>
      </tr>
    `;
  });
}

function tambahUser(){
  let nama = document.getElementById('nama').value;
  let email = document.getElementById('email').value;

  if(nama && email){
    users.push({nama, email});
    filteredUsers = [...users];
    renderUser();
  }
}

function hapusUser(index){
  users.splice(index,1);
  filteredUsers = [...users];
  renderUser();
}

function searchUser(){
  let keyword = document.getElementById('search').value.toLowerCase();

  filteredUsers = users.filter(user =>
    user.nama.toLowerCase().includes(keyword) ||
    user.email.toLowerCase().includes(keyword)
  );

  renderUser();
}

renderUser();
</script>

</body>
</html>
