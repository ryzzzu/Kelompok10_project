<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen User</title>
  <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-slate-50 font-sans text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-800 text-slate-300 flex flex-col">
    <div class="h-16 flex items-center justify-center border-b border-slate-700">
      <h1 class="text-2xl font-bold text-white tracking-wider">
        ADMIN<span class="text-blue-500">PRO</span>
      </h1>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2">
      <a href="index.html"
        class="flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg">
        Dashboard
      </a>

      <a href="user.html"
        class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-lg">
        Manajemen User
      </a>
    </nav>
  </aside>

  <!-- CONTENT -->
  <div class="flex flex-col flex-1">

    <!-- HEADER -->
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6">
      <h2 class="text-xl font-semibold">Manajemen User</h2>

      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-sm font-semibold">Admin Not's</p>
          <p class="text-xs text-slate-500">Superadmin</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-blue-100 border-2 border-blue-500 flex items-center justify-center font-bold">
          AN
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="p-6">

      <!-- CARD FORM -->
      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h3 class="text-lg font-semibold mb-4">Tambah User</h3>

        <div class="flex flex-wrap gap-3">
          <input id="nama" placeholder="Nama"
            class="border px-3 py-2 rounded w-full md:w-1/3 focus:ring-2 focus:ring-blue-400">

          <input id="email" placeholder="Email"
            class="border px-3 py-2 rounded w-full md:w-1/3 focus:ring-2 focus:ring-blue-400">

          <button onclick="tambahUser()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded transition">
            + Tambah
          </button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="mb-4">
        <input id="search" onkeyup="searchUser()" placeholder="Cari user..."
          class="border px-4 py-2 rounded w-full md:w-1/3 focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- TABLE -->
      <div class="bg-white rounded-xl shadow overflow-hidden">

        <table class="w-full text-sm">
          <thead class="bg-slate-100">
            <tr>
              <th class="p-3 text-left">Nama</th>
              <th class="p-3 text-left">Email</th>
              <th class="p-3 text-left">Aksi</th>
            </tr>
          </thead>

          <tbody id="userTable"></tbody>
        </table>

        <!-- EMPTY -->
        <div id="emptyState" class="text-center py-10 text-slate-400 hidden">
          Tidak ada user
        </div>

      </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-t py-4 px-6 text-sm text-slate-500">
      © 2026 AdminPro
    </footer>

  </div>
</div>

<script>
let users = [
  {nama: "Admin", email: "admin@gmail.com"}
];

let filteredUsers = [...users];

function renderUser(){
  let table = document.getElementById('userTable');
  let empty = document.getElementById('emptyState');

  table.innerHTML = "";

  if(filteredUsers.length === 0){
    empty.classList.remove("hidden");
    return;
  } else {
    empty.classList.add("hidden");
  }

  filteredUsers.forEach((user, index)=>{
    table.innerHTML += `
      <tr class="border-t hover:bg-slate-50 transition">
        <td class="p-3 font-medium">${user.nama}</td>
        <td class="p-3">${user.email}</td>
        <td class="p-3 space-x-2">
          <button onclick="editUser(${index})"
            class="bg-yellow-400 hover:bg-yellow-500 px-2 py-1 rounded text-xs">
            Edit
          </button>

          <button onclick="hapusUser(${index})"
            class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-xs">
            Hapus
          </button>
        </td>
      </tr>
    `;
  });
}

function tambahUser(){
  let nama = document.getElementById('nama').value;
  let email = document.getElementById('email').value;

  if(nama && email){
    users.push({nama, email});
    filteredUsers = [...users];
    renderUser();

    document.getElementById('nama').value = "";
    document.getElementById('email').value = "";
  }
}

function hapusUser(index){
  if(confirm("Hapus user?")){
    users.splice(index,1);
    filteredUsers = [...users];
    renderUser();
  }
}

function editUser(index){
  let namaBaru = prompt("Nama baru", filteredUsers[index].nama);
  let emailBaru = prompt("Email baru", filteredUsers[index].email);

  if(namaBaru && emailBaru){
    let realIndex = users.findIndex(u => u.email === filteredUsers[index].email);
    users[realIndex] = {nama: namaBaru, email: emailBaru};

    filteredUsers = [...users];
    renderUser();
  }
}

function searchUser(){
  let keyword = document.getElementById('search').value.toLowerCase();

  filteredUsers = users.filter(user =>
    user.nama.toLowerCase().includes(keyword) ||
    user.email.toLowerCase().includes(keyword)
  );

  renderUser();
}

renderUser();
</script>

</body>
</html>
